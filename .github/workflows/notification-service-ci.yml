name: "SmartPG — Notification Service CI/CD"

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sonarqube:
    uses: SmartPG-Application/.github/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: "smartpg-notification"
      service_path: "."
      sonar_project_key: "smartpg-notification"
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  build-snyk:
    needs: sonarqube
    uses: SmartPG-Application/.github/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: "smartpg-notification"
      service_path: "."
      node_version: "20"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  docker:
    needs: build-snyk
    if: github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-docker.yml@main
    with:
      service_name: "smartpg-notification"
      service_path: "."
      docker_image_name: "smartpg-notification-service"
      environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  approval:
    needs: docker
    if: github.ref_name == 'main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: "smartpg-notification"
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  cd:
    needs: [docker, approval]
    if: |
      always() &&
      needs.docker.result == 'success' &&
      (
        github.ref_name == 'develop' ||
        (github.ref_name == 'main' && needs.approval.result == 'success')
      )
    uses: SmartPG-Application/.github/.github/workflows/template-cd.yml@main
    with:
      service_name: "smartpg-notification"
      values_key: "notification"
      image_tag: ${{ needs.docker.outputs.image_tag }}
      environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
