name: "SmartPG — Notification Service CI/CD"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sonarqube:
    uses: SmartPG-Application/.github/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: "smartpg-notification-service"
      service_path: "."
      sonar_project_key: "smartpg-notification-service"
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  build-and-snyk:
    needs: sonarqube
    uses: SmartPG-Application/.github/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: "smartpg-notification-service"
      service_path: "."
      node_version: "20"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  docker-dev:
    needs: build-and-snyk
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-docker.yml@main
    with:
      service_name: "smartpg-notification-service"
      service_path: "."
      docker_image_name: "smartpg-notification-service"
      environment: "dev"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  docker-prod:
    needs: build-and-snyk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-docker.yml@main
    with:
      service_name: "smartpg-notification-service"
      service_path: "."
      docker_image_name: "smartpg-notification-service"
      environment: "prod"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  approval:
    needs: docker-prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: "smartpg-notification-service"
      image_tag: ${{ needs.docker-prod.outputs.image_tag }}
      values_key: "notification-service"
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  deploy:
    needs: [docker-prod, approval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-cd.yml@main
    with:
      service_name: "smartpg-notification-service"
      values_key: "notification-service"
      image_tag: ${{ needs.docker-prod.outputs.image_tag }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
